name: Deploy Aether to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Next.js
        run: npm run build

      - name: Debug Output
        run: |
          echo "Checking directory structure..."
          ls -la
          [ -d out ] && echo "out directory found" || echo "out directory NOT found"
          [ -d .next ] && echo ".next directory found" || echo ".next directory NOT found"

      - name: Prepare out directory
        run: |
          mkdir -p ./out
          touch ./out/.nojekyll

      - name: List out directory (Debug)
        run: ls -R ./out

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
